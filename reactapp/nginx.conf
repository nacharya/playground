# reactapp/nginx.conf — SPA + Reverse Proxy Configuration
# ==========================================================
# This nginx config serves the React SPA and proxies API calls
# to backend services. In production, a CDN (CloudFront, Cloudflare)
# would sit in front of this nginx for global edge caching.

server {
    listen 80;
    server_name _;

    # ── Root: serve the React SPA ──────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: any path that isn't a file should serve index.html
    # React Router handles the actual routing client-side.
    # Without this, refreshing on /users would return 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caching headers ────────────────────────────────────────────────────
    # Vite hashes file names (e.g., main.abc123.js) — safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }
    # HTML must never be cached — it references the hashed assets
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Proxy: goffj REST API ──────────────────────────────────────────────
    # React app calls /api/* → nginx proxies to goffj:8500/api/*
    # The browser never sees a CORS issue because the origin is the same.
    location /api/ {
        proxy_pass http://goffj:8500;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Proxy: tsnode tRPC ────────────────────────────────────────────────
    location /trpc/ {
        proxy_pass http://tsnode:8506;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Proxy: tsnode WebSocket ────────────────────────────────────────────
    # WebSocket requires special headers for the HTTP→WS upgrade handshake.
    location /ws/ {
        proxy_pass http://tsnode:8507;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;   # Long timeout for persistent WebSocket connections
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"              always;
    add_header X-Content-Type-Options  "nosniff"                 always;
    add_header X-XSS-Protection        "1; mode=block"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* wss://localhost:*;" always;

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 404 /index.html;  # SPA handles 404s client-side
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
