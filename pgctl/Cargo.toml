[package]
name = "pgctl"
description = "Playground CLI tool to control settings"
version = "0.1.3"
edition = "2021"
authors = ["nabin.acharya@gmail.com"]
readme = "README.md"
license = "MIT"


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0"
clap = { version = "4.5.1", features = ["cargo", "derive"] }
actix-web = "4"
log = { version = "0.4.21",  features = ["std"] }
env_logger = "0.11.3"
serde = "1.0.198"
serde_json = "1.0.116"
serde_derive = "1.0.198"
dirs = "5.0.1"
text_io = "0.1.12"

# ── gRPC (tonic stack) ────────────────────────────────────────────────────────
# tonic: gRPC framework for Rust, built on tokio + hyper
# prost: Protobuf encoding/decoding (generated by tonic-build)
# tokio: async runtime required by tonic
# tokio-stream: Stream utilities for server-streaming RPCs
# tonic-reflection: Allows grpcurl to discover services at runtime
# uuid + chrono: helpers for generated IDs and timestamps
# futures: Stream trait for streaming RPCs
tonic = { version = "0.11", optional = true }
prost = { version = "0.12", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tokio-stream = { version = "0.1", optional = true }
tonic-reflection = { version = "0.11", optional = true }
uuid = { version = "1", features = ["v4"], optional = true }
chrono = { version = "0.4", features = ["serde"], optional = true }
futures = { version = "0.3", optional = true }

[features]
# Build gRPC support only when the proto file is available and protoc is installed.
# Enable with: cargo build --features grpc
grpc = ["tonic", "prost", "tokio", "tokio-stream", "tonic-reflection", "uuid", "chrono", "futures"]

[build-dependencies]
# tonic-build runs protoc at build time to generate Rust gRPC stubs
# Only needed when the grpc feature is enabled
tonic-build = { version = "0.11", optional = true }


[package.metadata.deb]
name = "pgctl"
section = "admin"
priority = "optional"
assets = [
    ["target/release/pgctl", "/usr/bin/pgctl", "755"],
]
